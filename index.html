<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram & YouTube Downloader</title>
    <meta name="description" content="Download Foto, Reels, Carousel Instagram dan Video YouTube dengan mudah.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="container">
        <header>
            <h1>Media Downloader</h1>
            <p>Download dari Instagram atau YouTube tanpa batasan.</p>
        </header>

        <main>
            <div class="input-group">
                <div class="input-wrapper">
                    <input type="url" id="ig-url" placeholder="Paste link IG / YouTube di sini..." required>
                    <button type="button" id="clear-btn" class="hidden" aria-label="Clear URL">&times;</button>
                </div>
                <button id="download-btn">Download</button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Memproses tautan...</p>
            </div>

            <div id="error-message" class="hidden error">
                <p id="error-text">Gagal memproses tautan. Pastikan link valid dan akun publik.</p>
            </div>

            <div id="result-container" class="hidden">
                <h2>Hasil Unduhan</h2>
                <div id="media-list" class="media-grid"></div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 ig.minidigital.my.id. This tool is for personal use only.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
